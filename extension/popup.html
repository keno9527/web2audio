<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>web2audio</title>
    <style>
      body {
        width: 320px;
        margin: 0;
        padding: 14px;
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #172033;
      }

      label {
        display: block;
        margin: 0 0 10px;
        font-weight: 600;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        margin-top: 4px;
        padding: 8px;
        border: 1px solid #cfd7e3;
        border-radius: 6px;
        font: inherit;
      }

      button {
        width: 100%;
        padding: 9px 10px;
        border: 0;
        border-radius: 6px;
        background: #2563eb;
        color: white;
        font-weight: 650;
        cursor: pointer;
      }

      button:disabled {
        background: #94a3b8;
        cursor: progress;
      }

      #status {
        min-height: 20px;
        margin-top: 10px;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <label>
      API 地址
      <input id="server-url" type="url" value="http://127.0.0.1:8000">
    </label>
    <label>
      Token
      <input id="auth-token" type="password" value="dev-token">
    </label>
    <button id="submit">提交当前文章</button>
    <div id="status" role="status" aria-live="polite"></div>
    <script src="popup.js"></script>
  </body>
</html>
